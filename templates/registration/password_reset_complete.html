{% extends 'base.html' %}

{% block title %}Password Updated | AMFIT{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-intro">
            <p class="eyebrow">Success</p>
            <h1>Your password has been reset</h1>
            <p>You can now sign in with your new password.</p>
        </div>
        <p class="auth-switch"><a href="{% url 'users:login' %}">Go to login</a></p>
    </div>
</section>
{% endblock %}

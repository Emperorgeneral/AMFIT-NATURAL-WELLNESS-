{% extends 'base.html' %}

{% block title %}Email Sent | AMFIT{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-intro">
            <p class="eyebrow">Check your inbox</p>
            <h1>Password reset email sent</h1>
            <p>If an account exists for that email, you will receive a reset link shortly.</p>
        </div>
        <p class="auth-switch"><a href="{% url 'users:login' %}">Return to login</a></p>
    </div>
</section>
{% endblock %}
